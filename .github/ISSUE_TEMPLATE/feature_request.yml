name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting! Features that align with a Guardian's domain are prioritized.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see?
      placeholder: A clear description of the feature
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this useful? What problem does it solve?
    validations:
      required: true
  - type: dropdown
    id: domain
    attributes:
      label: Creative Domain
      description: Which domain does this feature belong to?
      options:
        - Code & Architecture (Lyssandria)
        - Design & Visual (Leyla)
        - Execution & Performance (Draconia)
        - Content & Documentation (Maylinn)
        - APIs & Expression (Alera)
        - Strategy & Vision (Lyria)
        - Teaching & Wisdom (Aiyami)
        - Transformation & Refactoring (Elara)
        - Integration & Collaboration (Ino)
        - Meta & Orchestration (Shinkami)
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Nice to have
        - Important
        - Critical
