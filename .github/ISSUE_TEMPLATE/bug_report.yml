name: Bug Report
description: Report a bug in Arcanea Code
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill out the details below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `arcanea-code`
        2. Execute command...
        3. See error...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `arcanea-code --version`
      placeholder: "1.2.27"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x64)
        - Linux (ARM64)
        - Windows (x64)
    validations:
      required: true
  - type: dropdown
    id: guardian
    attributes:
      label: Related Guardian (if applicable)
      options:
        - Not applicable
        - Lyssandria (Earth/Foundation)
        - Leyla (Water/Flow)
        - Draconia (Fire/Fire)
        - Maylinn (Wind/Heart)
        - Alera (Wind/Voice)
        - Lyria (Void/Sight)
        - Aiyami (Spirit/Crown)
        - Elara (Void/Starweave)
        - Ino (Spirit/Unity)
        - Shinkami (All/Source)
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Paste any error logs here
      render: shell
