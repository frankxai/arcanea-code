name: arcanea-code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  arcanea-code:
    if: |
      contains(github.event.comment.body, ' /arc') ||
      startsWith(github.event.comment.body, '/arc') ||
      contains(github.event.comment.body, ' /arcanea') ||
      startsWith(github.event.comment.body, '/arcanea') ||
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-bun

      - name: Run arcanea-code
        uses: anomalyco/opencode/github@latest
        env:
          ARCANEA_API_KEY: ${{ secrets.ARCANEA_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.ARCANEA_API_KEY }}
          ARCANEA_PERMISSION: '{"bash": "deny"}'
        with:
          model: opencode/claude-opus-4-5
